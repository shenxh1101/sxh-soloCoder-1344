global:
  log_dir: ./logs
  snapshot_file: ./.mservice_snapshot.json
  health_check_interval: 5

services:
  - name: redis
    repo_path: ./services/redis
    command: redis-server --port 6379
    color: red
    health_check:
      type: tcp
      port: 6379
      timeout: 3
      retries: 3
    max_restarts: 3

  - name: mysql
    repo_path: ./services/mysql
    command: mysqld --port=3306
    color: blue
    depends_on:
      - redis
    health_check:
      type: tcp
      port: 3306
      timeout: 5
      retries: 5
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - host: 3306
        container: 3306
    max_restarts: 3

  - name: api-gateway
    repo_path: ./services/api-gateway
    command: node server.js
    color: green
    depends_on:
      - redis
      - mysql
    health_check:
      type: http
      port: 8080
      path: /health
      timeout: 3
      retries: 3
    environment:
      PORT: 8080
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
    ports:
      - "8080:8080"
    max_restarts: 3

  - name: user-service
    repo_path: ./services/user-service
    command: python app.py
    color: magenta
    depends_on:
      - mysql
      - redis
    health_check:
      type: http
      port: 8081
      path: /api/health
      timeout: 3
      retries: 3
    environment:
      PORT: 8081
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
    ports:
      - "8081:8081"
    max_restarts: 3

  - name: frontend
    repo_path: ./services/frontend
    command: npm start
    color: cyan
    depends_on:
      - api-gateway
      - user-service
    health_check:
      type: http
      port: 3000
      path: /
      timeout: 5
      retries: 5
    environment:
      API_URL: http://127.0.0.1:8080
    ports:
      - "3000:3000"
    max_restarts: 3
